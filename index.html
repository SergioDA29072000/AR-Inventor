<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Baranda AR</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>

<model-viewer
  src="baranda2000.glb"
  ar
  ar-modes="scene-viewer webxr"
  camera-controls
  autoplay
  shadow-intensity="1">

  <button slot="ar-button">
    Ver en AR
  </button>

</model-viewer>

</body>
</html>
